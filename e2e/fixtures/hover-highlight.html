</style>
</head>
<body>
  <div id="target-a" class="box">A</div>

  <div style="height: 300px;"></div>
  <div id="target-mid" class="box">Mid</div>
  <div class="spacer"></div>
  <div id="target-b" class="box">B</div>
</body>
</html>
